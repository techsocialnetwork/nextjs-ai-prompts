name: Deploy & Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd examples/blog-app
          npm ci

      - name: Type check
        run: |
          cd examples/blog-app
          npm run type-check || npx tsc --noEmit

      - name: Build
        run: |
          cd examples/blog-app
          npm run build

